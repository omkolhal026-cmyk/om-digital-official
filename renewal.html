<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Renewal</title>

<link rel="stylesheet" href="renewal.css">

</head>

<body>

<div class="container">

<div class="card">

<h1>🏢 OM DIGITAL E-SEVA KENDRA</h1>

<h2>RENEWAL</h2>

<form id="renewForm">

<div class="row">

<div class="inputBox">
<label>Full Name</label>
<input
type="text"
id="name"
placeholder="Enter Full Name"
required>
</div>

<div class="inputBox">
<label>MH Number</label>
<input
type="text"
id="mhNumber"
maxlength="14"
placeholder="MH123456789012"
oninput="formatMH(this)"
required>
</div>

</div>

<div class="row">

<div class="inputBox">
<label>Mobile Number</label>
<input
type="text"
id="mobile"
maxlength="10"
placeholder="Enter Mobile Number"
required>
</div>

<div class="inputBox">
<label>Renewal Date</label>
<input
type="date"
id="renewDate"
readonly>
</div>

</div>

<div class="row">

<div class="inputBox">
<label>Verification Date</label>
<input
type="date"
id="verifyDate"
required>
</div>

<div class="inputBox">
<label>Verification Taluka</label>

<select id="verifyTaluka">

<option value="">Select Taluka</option>

<option>Junnar</option>
<option>Ambegaon</option>
<option>Khed</option>
<option>Shirur</option>

</select>

</div>

</div>

<div class="row">

<div class="inputBox">

<label>From</label>

<select id="from">

<option>SELECT</option>
<option>OFFICE</option>
<option>AK</option>
<option>OM</option>
<option>VAIDYA</option>
<option>MANJU</option>
<option>KUMAR</option>
<option>SEJAL</option>
<option>AJINKYA</option>
<option>HANDE</option>
<option>BHUTE</option>
<option>ABHISHEK</option>
<option>CHASKAR</option>
<option>KUTAL</option>
<option>AKASH</option>
<option>KALEKAR</option>
<option>PARTH</option>
<option>AHER</option>
<option>BOTA</option>
<option>WAYKAR</option>
<option>HADAWALE</option>

</select>

</div>

<div class="inputBox">

<label>Form Filler</label>

<select id="filler">

<option>SELECT</option>
<option>VAISHNAVI</option>
<option>PRACHI</option>
<option>SHUBHANGI</option>
<option>OM</option>

</select>

</div>

</div>

<div class="buttons">

<button
type="button"
id="saveBtn">

💾 SAVE

</button>

<button
type="button"
onclick="window.location='dashboard.html'">

⬅ BACK

</button>

</div>

</form>

</div>

</div>

<script src="renewal.js"></script>

</body>

</html>
